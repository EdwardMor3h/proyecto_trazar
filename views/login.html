<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangoScan - Predictive Analytics</title>
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">
    
    <style>
        :root {
            --mango: #FFB300;
            --agro-green: #2E7D32;
            --heat-red: rgba(255, 69, 0, 0.4);
            --heat-yellow: rgba(255, 215, 0, 0.3);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #051a05;
            overflow: hidden;
        }

        /* Contenedor Principal con la imagen de fondo */
        .viewport {
            position: relative;
            height: 100vh;
            width: 100%;
            background: url('../assets/images/img-login-geofarms-iii.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CAPA DE HEATMAP ANIMADO */
        .heatmap-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, var(--heat-red) 0%, transparent 20%),
                radial-gradient(circle at 70% 60%, var(--heat-yellow) 0%, transparent 25%),
                radial-gradient(circle at 40% 80%, var(--heat-red) 0%, transparent 15%),
                radial-gradient(circle at 80% 20%, var(--heat-yellow) 0%, transparent 20%);
            filter: blur(30px);
            animation: pulseHeat 8s infinite alternate;
            z-index: 1;
        }

        @keyframes pulseHeat {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        /* Oscurecedor para legibilidad */
        .darken {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2;
        }

        /* Glass Card */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        .brand {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--agro-green);
            margin-bottom: 0;
        }
        .brand span { color: var(--mango); }

        .uav-badge {
            display: inline-block;
            background: var(--agro-green);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .form-control-pill {
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 12px 15px;
            background: #f8f9fa;
            transition: 0.3s;
        }

        .form-control-pill:focus {
            border-color: var(--agro-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
            background: #fff;
        }

        .btn-predict {
            background: linear-gradient(to right, var(--agro-green), #43a047);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-predict:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .copyright {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            color: white;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="viewport">
        <!-- Capas de fondo -->
        <div class="heatmap-overlay"></div>
        <div class="darken"></div>

        <!-- Login -->
        <div class="login-card">
            <div class="uav-badge">UAV PREDICTION SYSTEM</div>
            <h1 class="brand">Mango<span>Scan</span></h1>
            <p class="text-muted small mb-4">Plataforma de Estimación de Rendimiento</p>

            <form id="loginForm">
                <div class="text-start mb-3">
                    <label class="small fw-bold mb-1">USUARIO GEORREFERENCIADO</label>
                    <input type="text" class="form-control form-control-pill" placeholder="Ingrese su ID">
                </div>
                
                <div class="text-start mb-4">
                    <label class="small fw-bold mb-1">CONTRASEÑA</label>
                    <input type="password" class="form-control form-control-pill" placeholder="••••••••">
                </div>

                <button type="button" class="btn btn-predict" id="loginButton">
                    INICIAR ANÁLISIS
                </button>
            </form>
        </div>

        <div class="copyright">
            © 2026 TraZar - Desarrollo de Sistemas Inteligentes
        </div>
    </div>

    <script src="../assets/js/jquery-3.6.0.min.js"></script>
    <script src="../js/login/index.js"></script>
</body>
</html>
